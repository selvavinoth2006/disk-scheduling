    <title>OS Simulator - Disk Scheduling & Cache</title>

      rel="stylesheet"

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js"></script>
    <script>
      const mainPy = `import streamlit as st
import pandas as pd
import plotly.graph_objects as go
import cache_algorithms as cache
import disk_algorithms as disk

st.set_page_config(page_title="OS Simulator", layout="wide", page_icon="💻")

st.markdown("""
<style>
    .stApp { background-color: #ffffff; color: #1f2937; }
    .stHeader { background: #f8fafc; border-bottom: 2px solid #e2e8f0; padding: 1rem; }
    h1 { color: #1e3a8a; font-weight: 700; text-align: center; }
    .stButton>button { width: 100%; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white !important; font-weight: 600; }
    [data-testid="stMetric"] { background: #ffffff; border: 1px solid #e2e8f0; padding: 1rem; border-radius: 0.5rem; }
    [data-testid="stMetricValue"] { color: #2563eb !important; font-weight: 800; }
</style>
""", unsafe_allow_html=True)

st.title("💻 OS Simulator")
st.markdown("<p style='text-align: center; color: #64748b;'>Visualize Memory and Disk Algorithms in a professional environment.</p>", unsafe_allow_html=True)

tab1, tab2, tab3 = st.tabs(["🧠 Cache Replacement", "💿 Disk Scheduling", "📊 Comparison"])

# --- CACHE REPLACEMENT ---
with tab1:
    st.header("Cache Memory Simulation")
    col1, col2 = st.columns([1, 2])
    with col1:
        c_input = st.text_input("Page Reference String", "7, 0, 1, 2, 0, 3, 0, 4, 2, 3, 0, 3, 2", key="c_input")
        c_frames = st.number_input("Number of Frames", 1, 10, 3, key="c_frames")
        c_algo = st.selectbox("Algorithm", ["FIFO", "LRU", "Optimal"], key="c_algo")
        run_cache = st.button("Run Cache Simulation", key="btn_cache")

    if run_cache:
        try:
            pages = [int(p.strip()) for p in c_input.split(",") if p.strip()]
            if c_algo == "FIFO": history, hits, faults = cache.fifo(pages, c_frames)
            elif c_algo == "LRU": history, hits, faults = cache.lru(pages, c_frames)
            else: history, hits, faults = cache.optimal(pages, c_frames)
            
            with col2:
                st.subheader(f"Results: {c_algo}")
                m1, m2, m3 = st.columns(3)
                m1.metric("Hits", hits)
                m2.metric("Faults", faults)
                m3.metric("Ratio", f"{(hits/len(pages)):.2f}")
                
                df_data = []
                for step in history:
                    row = {"Page": step["Page"]}
                    for i in range(c_frames):
                        row[f"F{i+1}"] = step["Frames"][i] if i < len(step["Frames"]) else "-"
                    row["Status"] = "✅ Hit" if step["Status"] == "Hit" else "❌ Miss"
                    df_data.append(row)
                st.table(pd.DataFrame(df_data))
        except Exception as e:
            st.error(f"Cache Input Error: {str(e)}")

# --- DISK SCHEDULING ---
with tab2:
    st.header("Disk Scheduling Simulation")
    col1, col2 = st.columns([1, 2])
    with col1:
        d_input = st.text_input("Request Queue", "98, 183, 37, 122, 14, 124, 65, 67", key="d_input")
        d_head = st.number_input("Initial Head Position", value=53, key="d_head")
        d_algo = st.selectbox("Algorithm", ["FCFS", "SSTF", "SCAN", "C-SCAN"], key="d_algo")
        run_disk = st.button("Run Disk Simulation", key="btn_disk")

    if run_disk:
        try:
            reqs = [int(r.strip()) for r in d_input.split(",") if r.strip()]
            if d_algo == "FCFS": seq, dist = disk.fcfs(reqs, d_head)
            elif d_algo == "SSTF": seq, dist = disk.sstf(reqs, d_head)
            elif d_algo == "SCAN": seq, dist = disk.scan(reqs, d_head, "right", 199)
            else: seq, dist = disk.cscan(reqs, d_head, "right", 199)
            
            with col2:
                st.subheader(f"Results: {d_algo}")
                st.success(f"Total Head Movement: {dist}")
                fig = go.Figure(go.Scatter(x=seq, y=list(range(len(seq))), mode='lines+markers+text', text=seq, textposition="top center"))
                fig.update_layout(template="plotly_white", margin=dict(l=20, r=20, t=10, b=10))
                st.plotly_chart(fig, use_container_width=True)
        except Exception as e:
            st.error(f"Disk Input Error: {str(e)}")

# --- COMPARISON ---
with tab3:
    st.header("Comparison Matrix")
    c_type = st.radio("Type", ["Cache", "Disk"], horizontal=True)
    if c_type == "Cache":
        if st.button("Compare All Cache"):
            pages = [int(p.strip()) for p in c_input.split(",") if p.strip()]
            res = {"FIFO": cache.fifo(pages, c_frames)[2], "LRU": cache.lru(pages, c_frames)[2], "Optimal": cache.optimal(pages, c_frames)[2]}
            st.bar_chart(pd.Series(res))
    else:
        if st.button("Compare All Disk"):
            reqs = [int(r.strip()) for r in d_input.split(",") if r.strip()]
            res = {"FCFS": disk.fcfs(reqs, d_head)[1], "SSTF": disk.sstf(reqs, d_head)[1], "SCAN": disk.scan(reqs, d_head)[1], "C-SCAN": disk.cscan(reqs, d_head)[1]}
            st.bar_chart(pd.Series(res))
`;

      const cachePy = \`import pandas as pd
def fifo(pages, frame_count):
    frames, faults, hits, history = [], 0, 0, []
    for page in pages:
        status = "Hit"
        if page not in frames:
            status = "Miss"
            if len(frames) < frame_count: frames.append(page)
            else: frames.pop(0); frames.append(page)
            faults += 1
        else: hits += 1
        history.append({'Page': page, 'Frames': list(frames), 'Status': status})
    return history, hits, faults

def lru(pages, frame_count):
    frames, faults, hits, history = [], 0, 0, []
    for page in pages:
        status = "Hit"
        if page not in frames:
            status = "Miss"
            if len(frames) < frame_count: frames.append(page)
            else: frames.pop(0); frames.append(page)
            faults += 1
        else:
            hits += 1
            frames.remove(page); frames.append(page)
        history.append({'Page': page, 'Frames': list(frames), 'Status': status})
    return history, hits, faults

def optimal(pages, frame_count):
    frames, faults, hits, history = [], 0, 0, []
    for i in range(len(pages)):
        page = pages[i]
        status = "Hit"
        if page not in frames:
            status = "Miss"
            if len(frames) < frame_count: frames.append(page)
            else:
                farthest, replace_idx = -1, -1
                for j in range(len(frames)):
                    try: next_use = pages[i+1:].index(frames[j])
                    except ValueError: next_use = float('inf')
                    if next_use > farthest: farthest = next_use; replace_idx = j
                frames[replace_idx] = page
            faults += 1
        else: hits += 1
        history.append({'Page': page, 'Frames': list(frames), 'Status': status})
    return history, hits, faults
\`;

      const diskPy = \`def fcfs(requests, head):
    sequence = [head] + requests
    distance = sum(abs(sequence[i] - sequence[i-1]) for i in range(1, len(sequence)))
    return sequence, distance

def sstf(requests, head):
    sequence, reqs, distance, curr = [head], list(requests), 0, head
    while reqs:
        closest = min(reqs, key=lambda x: abs(x - curr))
        distance += abs(closest - curr)
        curr = closest
        sequence.append(curr)
        reqs.remove(closest)
    return sequence, distance

def scan(requests, head, direction="right", max_track=199):
    sequence, distance, reqs = [head], 0, sorted(requests)
    left = [r for r in reqs if r < head]
    right = [r for r in reqs if r >= head]
    path = right + [max_track] + left[::-1] if direction == "right" else left[::-1] + [0] + right
    for p in path:
        distance += abs(p - sequence[-1])
        sequence.append(p)
    return sequence, distance

def cscan(requests, head, direction="right", max_track=199):
    sequence, distance, reqs = [head], 0, sorted(requests)
    left = [r for r in reqs if r < head]
    right = [r for r in reqs if r >= head]
    path = right + [max_track, 0] + left if direction == "right" else left[::-1] + [0, max_track] + right[::-1]
    for p in path:
        distance += abs(p - sequence[-1])
        sequence.append(p)
    return sequence, distance
\`;

      stlite.mount({
        requirements: ["pandas", "plotly"],
        entrypoint: "main.py",
        files: { "main.py": mainPy, "cache_algorithms.py": cachePy, "disk_algorithms.py": diskPy },
      }, document.getElementById("root"));
    </script>
