    <div id="root"></div>

    <script>
      // We load the existing files and mount them into stlite
      const mainPy = `import streamlit as st
import pandas as pd
import matplotlib.pyplot as plt
import plotly.graph_objects as go
import cache_algorithms as cache
import disk_algorithms as disk
import io

# Page Config
st.set_page_config(page_title="OS Simulator", layout="wide", page_icon="💻")

st.markdown("""
<style>
    .stApp { background-color: #ffffff; color: #1f2937; }
    h1 { color: #1e3a8a; font-weight: 700; text-align: center; }
    .stButton>button { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white !important; }
</style>
""", unsafe_allow_html=True)

st.title("💻 OS Simulator")
tab1, tab2, tab3 = st.tabs(["🧠 Cache Replacement", "💿 Disk Scheduling", "📊 Comparison"])

# Load modules from strings (handled by stlite)
with tab1:
    st.header("Cache Memory Simulation")
    page_input = st.text_input("Page Reference String", "7, 0, 1, 2, 0, 3, 0, 4, 2, 3, 0, 3, 2")
    frame_size = st.number_input("Number of Frames", 1, 10, 3)
    if st.button("Run Cache"):
        pages = [int(p.strip()) for p in page_input.split(",")]
        history, hits, faults = cache.fifo(pages, frame_size)
        st.metric("Faults", faults)
        st.table(pd.DataFrame(history))

with tab2:
    st.header("Disk Scheduling Simulation")
    disk_input = st.text_input("Request Queue", "98, 183, 37, 122, 14, 124, 65, 67")
    initial_head = st.number_input("Head Position", value=53)
    if st.button("Run Disk"):
        requests = [int(r.strip()) for r in disk_input.split(",")]
        sequence, distance = disk.fcfs(requests, initial_head)
        st.success(f"Distance: {distance}")
        fig = go.Figure(go.Scatter(x=sequence, y=list(range(len(sequence))), mode='lines+markers'))
        st.plotly_chart(fig)

with tab3:
    st.header("Algorithm Comparison")
    st.info("Select algorithm tabs above to run simulations first.")
`;

      const cachePy = `def fifo(pages, frame_count):
    frames, faults, hits, history = [], 0, 0, []
    for page in pages:
        status = "Hit"
        if page not in frames:
            status = "Miss"
            if len(frames) < frame_count: frames.append(page)
            else: frames.pop(0); frames.append(page)
            faults += 1
        else: hits += 1
        history.append({'Page': page, 'Frames': list(frames), 'Status': status})
    return history, hits, faults

def lru(pages, frame_count):
    frames, faults, hits, history = [], 0, 0, []
    for page in pages:
        status = "Hit"
        if page not in frames:
            status = "Miss"
            if len(frames) < frame_count: frames.append(page)
            else: frames.pop(0); frames.append(page)
            faults += 1
        else:
            hits += 1
            frames.remove(page); frames.append(page)
        history.append({'Page': page, 'Frames': list(frames), 'Status': status})
    return history, hits, faults

def optimal(pages, frame_count):
    frames, faults, hits, history = [], 0, 0, []
    for i in range(len(pages)):
        page = pages[i]
        status = "Hit"
        if page not in frames:
            status = "Miss"
            if len(frames) < frame_count: frames.append(page)
            else:
                farthest, replace_idx = -1, -1
                for j in range(len(frames)):
                    try: next_use = pages[i+1:].index(frames[j])
                    except ValueError: next_use = float('inf')
                    if next_use > farthest: farthest = next_use; replace_idx = j
                frames[replace_idx] = page
            faults += 1
        else: hits += 1
        history.append({'Page': page, 'Frames': list(frames), 'Status': status})
    return history, hits, faults
`;

      const diskPy = `def fcfs(requests, head):
    sequence = [head] + requests
    distance = sum(abs(sequence[i] - sequence[i-1]) for i in range(1, len(sequence)))
    return sequence, distance

def sstf(requests, head):
    sequence, reqs, distance, curr = [head], list(requests), 0, head
    while reqs:
        closest = min(reqs, key=lambda x: abs(x - curr))
        distance += abs(closest - curr)
        curr = closest
        sequence.append(curr)
        reqs.remove(closest)
    return sequence, distance

def scan(requests, head, direction="left", max_track=199):
    sequence, distance, reqs = [head], 0, sorted(requests)
    left = [r for r in reqs if r < head]
    right = [r for r in reqs if r >= head]
    path = left[::-1] + [0] + right if direction == "left" else right + [max_track] + left[::-1]
    for p in path:
        distance += abs(p - sequence[-1])
        sequence.append(p)
    return sequence, distance

def cscan(requests, head, direction="right", max_track=199):
    sequence, distance, reqs = [head], 0, sorted(requests)
    left = [r for r in reqs if r < head]
    right = [r for r in reqs if r >= head]
    path = right + [max_track, 0] + left if direction == "right" else left[::-1] + [0, max_track] + right[::-1]
    for p in path:
        distance += abs(p - sequence[-1])
        sequence.append(p)
    return sequence, distance
`;

      stlite.mount(
        {
          requirements: ["pandas", "matplotlib", "plotly"],
          entrypoint: "main.py",
          files: {
            "main.py": mainPy,
            "cache_algorithms.py": cachePy,
            "disk_algorithms.py": diskPy
          },
        },
        document.getElementById("root")
      );
    </script>
